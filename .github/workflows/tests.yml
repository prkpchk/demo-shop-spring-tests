name: QA Tests

on:
  push:
    branches:
      - "**"

env:
  JAVA_VERSION: "21"
  HEADLESS: "true"
  BROWSER: "chrome"
  APP_BASE_URL: "http://localhost:8080"
  APP_UI_URL: "http://localhost:80"
  DB_URL: "jdbc:postgresql://localhost:5432/demoshop"
  DB_USER: "demoshop"
  DB_PASSWORD: "demoshop"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Start demo-shop stack
        run: |
          docker compose -f docker-compose.hub.yml up -d
          timeout 120 bash -c "until curl -sf http://localhost:8080/actuator/health; do sleep 5; done"
          echo "demo-shop stack is ready"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run API tests
        run: |
          ./gradlew test \
            -Dspring.profiles.active=ci \
            -Djunit.jupiter.execution.parallel.config.fixed.parallelism=4 \
            --tests "com.demoshop.qa.api.*" \
            --continue

      - name: Run UI tests
        run: |
          ./gradlew test \
            -Dspring.profiles.active=ci \
            -Djunit.jupiter.execution.parallel.config.fixed.parallelism=2 \
            --tests "com.demoshop.qa.ui.*" \
            --continue

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: build/allure-results
          allure_history: allure-history

      - name: Publish Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts-${{ github.run_number }}
          path: |
            build/allure-results/
            build/allure-report/
            build/reports/selenide/
            build/reports/video/
            build/reports/logs/
            build/test-results/
          retention-days: 14

      - name: Publish JUnit Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: build/test-results/**/*.xml

      - name: Stop demo-shop stack
        if: always()
        run: docker compose -f docker-compose.hub.yml down
