spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://demoshop-postgres:5432/demoshop}
    username: ${DB_USER:demoshop}
    password: ${DB_PASSWORD:demoshop}

app:
  base-url: ${APP_BASE_URL:http://demoshop-app:8080}
  ui-url: ${APP_UI_URL:http://demoshop-frontend:80}

selenide:
  browser: ${BROWSER:chrome}
  headless: true
  reports-folder: build/reports/selenide
  video-folder: build/reports/video
